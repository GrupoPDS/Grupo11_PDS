name: "🟢 Production — Release"

on:
  release:
    types: [ published ]

jobs:
  # =============================================
  # Job 1: Backend — Lint + Testes
  # =============================================
  backend-checks:
    name: "☕ Backend (Java)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: "🎨 Check Code Formatting (Spotless)"
      run: ./mvnw spotless:check -q

    - name: "🧪 Run Tests (JUnit + Mockito)"
      run: ./mvnw test

    - name: "📋 Verify Flyway Migrations Naming"
      run: |
        if ls src/main/resources/db/migration | grep -vE '^V[0-9]+__.*\.sql$'; then
          echo "❌ Arquivos de migração fora do padrão!"
          exit 1
        fi
        echo "✅ Migrações OK."

  # =============================================
  # Job 2: Frontend — Lint + Prettier
  # =============================================
  frontend-checks:
    name: "⚛️ Frontend (React)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: "🎨 Check Formatting (Prettier)"
      run: npx prettier --check .

    - name: "🔍 Lint (ESLint)"
      run: npm run lint

  # =============================================
  # Job 3: Docker Build + Trivy Security Scan
  # =============================================
  docker-build-check:
    name: "🐳 Docker Build + Security"
    needs: [backend-checks, frontend-checks]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        load: true
        tags: library-backend:release

    - name: "🔒 Trivy Vulnerability Scanner"
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'library-backend:release'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL'

  # =============================================
  # Job 4: Deploy para Produção (Backend e Frontend)
  # =============================================
  deploy-production:
    name: "🚀 Deploy Production"
    needs: [backend-checks, frontend-checks, docker-build-check]
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: "🚀 Trigger Render Production Deploy (Backend)"
      run: |
        echo "🔄 Acionando deploy de produção no Render..."
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}")
        if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
          echo "✅ Deploy Backend acionado com sucesso! (HTTP $RESPONSE)"
        else
          echo "❌ Falha ao acionar deploy do Backend! (HTTP $RESPONSE)"
          exit 1
        fi

    - name: "🚀 Trigger Vercel Production Deploy (Frontend)"
      run: |
        echo "🔄 Acionando deploy de produção na Vercel..."
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_PROD_DEPLOY_HOOK }}")
        if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
          echo "✅ Deploy Frontend acionado com sucesso! (HTTP $RESPONSE)"
        else
          echo "❌ Falha ao acionar deploy do Frontend! (HTTP $RESPONSE)"
          exit 1
        fi

    - name: "📝 Release Summary"
      run: |
        echo "=========================================="
        echo "🟢 PRODUÇÃO — Deploys acionados!"
        echo "=========================================="
        echo "Release: ${{ github.event.release.tag_name }}"
        echo "Título:  ${{ github.event.release.name }}"
        echo "Autor:   ${{ github.event.release.author.login }}"
        echo "Status:  Backend (Render) e Frontend (Vercel) OK"
        echo "=========================================="
